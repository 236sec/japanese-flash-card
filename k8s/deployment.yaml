apiVersion: apps/v1
kind: Deployment
metadata:
  name: japanese-flash-card
  labels:
    app: japanese-flash-card
spec:
  replicas: 1
  selector:
    matchLabels:
      app: japanese-flash-card
  template:
    metadata:
      labels:
        app: japanese-flash-card
    spec:
      containers:
        - name: japanese-flash-card
          image: your-username/japanese-flash-card:latest  # ← auto‑updated by Jenkins
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: japanese-flash-card
spec:
  selector:
    app: japanese-flash-card
  ports:
    - port: 80
      targetPort: 80
